[project]
name = "webhook-gateway"
language = "node"

[git]
main_branch = "main"
tag_format = "v{version}"
changelog = true
commit_message = "release: {{ version }}"
remote = "origin"
require_clean = true
require_main_branch = true
fetch_timeout_secs = 60
push_timeout_secs = 120
operation_timeout_secs = 30

[docker]
registry = "ghcr"
repository = "my-org/webhook-gateway"
dockerfile = "Dockerfile"
context = "."
tags = ["{version}", "latest", "sha-{git_sha}"]

[kubernetes]
context = "dev-cluster"
namespace = "apps"
deployment = "webhook-gateway"
manifest_path = "k8s/deployment.yaml"
image_field = "app"
rollout_timeout = 300
min_ready_percent = 100

[aws]
region = "us-east-1"

[github]
repository = "my-org/webhook-gateway"
token = "${GITHUB_TOKEN}"
create_release = true
prerelease = false
draft = false
